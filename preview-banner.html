<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Preview Banner</title>
<style>
  body { font-family: 'Open Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  .banner { background: #dc2626; padding: 16px; border-radius: 8px; border: 2px solid #b91c1c; max-width: 480px; width: 90%; }
  .banner p { color: white; font-weight: 900; text-align: center; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.6; margin: 0; }
  .data { color: #FFD700; font-size: 14.3px; }
</style>
</head>
<body>
  <div class="banner">
    <p>
      ⚠️ PARABÉNS! VOCÊ INICIOU O SEU PROCESSO. ENTRAREMOS EM CONTATO NA DATA:
      <span class="data">18/07/2026</span>
      PARA INFORMAÇÕES DAS AULAS, EXAMES E FINALIZAÇÃO DO PROCESSO.
    </p>
  </div>
</body>
</html>
